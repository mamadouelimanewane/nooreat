name: Build Android APKs (Ndugumi)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build_user_app:
    name: 📱 Build User App APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/user-app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/user-app
        run: npm ci

      - name: Build APK (Local)
        working-directory: ./mobile/user-app
        run: npx eas-cli build --platform android --profile preview --local --non-interactive --output=./ndugumi-user.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndugumi-user-apk
          path: ./mobile/user-app/ndugumi-user.apk
          retention-days: 7

  build_driver_app:
    name: 🛵 Build Driver App APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/driver-app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./mobile/driver-app
        run: npm ci

      - name: Build APK (Local)
        working-directory: ./mobile/driver-app
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g"
          NODE_OPTIONS: --max-old-space-size=4096
        run: npx eas-cli build --platform android --profile preview --local --non-interactive --output=./ndugumi-driver.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndugumi-driver-apk
          path: ./mobile/driver-app/ndugumi-driver.apk
          retention-days: 7
